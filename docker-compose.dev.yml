services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uni_help
      POSTGRES_PASSWORD: uni_help_pass
      POSTGRES_DB: uni_help
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@university.ru
      PGADMIN_DEFAULT_PASSWORD: admin12345
    ports:
      - "5050:80"

volumes:
  postgres_data:
